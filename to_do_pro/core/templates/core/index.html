<!DOCTYPE html>
<html>
<head>
    <title>Todo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label>Task Name</label>
        <input type="text" class="form-control" name="name">
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea class="form-control" name="desc"></textarea>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="priority" value="high">
        <label>High</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="priority" value="medium" checked>
        <label>Medium</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="priority" value="low">
        <label>Low</label>
    </div>

    <br>

    <button type="submit" class="btn btn-success">
        Add Task
    </button>

</form>

<hr>

{% for t in tasks %}

<div class="card mt-3">
    <div class="card-body">
        <h4>{{ t.name }}</h4>
        <p>{{ t.description }}</p>
        <strong>{{ t.priority }}</strong>
    </div>
</div>

{% endfor %}

</body>
</html>
